<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Product Selection" data-ar="اختيار المنتج">Product Selection</title>
    <link rel="icon" href="logoTitle.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="rtl.css" id="rtl-stylesheet" disabled>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="center-image-container" id="home">
    <a href="index.html">
        <img src="logo.png" alt="The logo" class="center-image">
    </a>
    </div>


    <section class="products" id="products">
        <div class="container2" id="products-container">
            <!-- Products loaded dynamically here -->
            <div class="loading" data-en="Loading products..." data-ar="جاري تحميل المنتجات...">Loading products...</div>
        </div>
    </section>

    <div class="popup-overlay" id="product-popup">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            
            <div id="product-info">
                <h3 id="product-name"></h3>
                <p id="product-description"></p>
                <p class="price" id="product-price"></p>
            </div>
            
            <div class="form-group">
                <label for="color-dropdown" data-en="Choose Color:" data-ar="اختر اللون:">Choose Color:</label>
                <select id="color-dropdown">
                    <option value="" data-en="Select color" data-ar="اختر لون">Select color</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="scent-dropdown" data-en="Choose Scent:" data-ar="اختر الرائحة:">Choose Scent:</label>
                <select id="scent-dropdown">
                    <option value="" data-en="Select scent" data-ar="اختر رائحة">Select scent</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="additional-info" data-en="Additional Information:" data-ar="معلومات إضافية:">Additional Information:</label>
                <input type="text" id="additional-info" 
                       data-ph-en="Enter any additional info" 
                       data-ph-ar="أدخل أي معلومات إضافية">
            </div>

            <div class="quantity-container">
                <label for="quantity" data-en="Quantity:" data-ar="الكمية:">Quantity:</label>
                <div class="quantity-controls">
                    <button type="button" class="quantity-btn" id="decrease-qty">-</button>
                    <input type="text" id="quantity" value="1" inputmode="numeric" pattern="[0-9]*">
                    <button type="button" class="quantity-btn" id="increase-qty">+</button>
                </div>
                <button id="submit-btn" data-en="Add to Basket" data-ar="أضف إلى السلة">Add to Basket</button>
            </div>
        </div>
    </div>    

    <div class="button-container">
        <a href="index.html" class="back-button" data-en="Back to Home Page" data-ar="العودة إلى الصفحة الرئيسية">Back to Home Page</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="language.js"></script>
    <script src="script.js"></script>
</body>
</html>
